name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: sa-east-1
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            web/package-lock.json
            infra/package-lock.json

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # ---- Deploy infra ----
      - name: Install infra deps
        working-directory: infra
        run: npm ci

      - name: CDK deploy
        working-directory: infra
        run: npx cdk deploy --require-approval never --outputs-file cdk-outputs.json

      - name: Read stack outputs
        id: outputs
        working-directory: infra
        run: |
          set -e
          outputs=$(cat cdk-outputs.json)
          echo "API_URL=$(echo "$outputs" | jq -r '.LocalTourismStack.ApiUrl')" >> $GITHUB_OUTPUT
          echo "POOL_ID=$(echo "$outputs" | jq -r '.LocalTourismStack.UserPoolId')" >> $GITHUB_OUTPUT
          echo "CLIENT_ID=$(echo "$outputs" | jq -r '.LocalTourismStack.UserPoolClientId')" >> $GITHUB_OUTPUT
          echo "DOMAIN=$(echo "$outputs" | jq -r '.LocalTourismStack.DistributionDomain')" >> $GITHUB_OUTPUT
          echo "DIST_ID=$(echo "$outputs" | jq -r '.LocalTourismStack.DistributionId')" >> $GITHUB_OUTPUT
          echo "SITE_BUCKET=$(echo "$outputs" | jq -r '.LocalTourismStack.SiteBucketName')" >> $GITHUB_OUTPUT
          echo "REGION=$(echo "$outputs" | jq -r '.LocalTourismStack.Region')" >> $GITHUB_OUTPUT

      # ---- Build & sync web ----
      - name: Install web deps
        working-directory: web
        run: npm ci

      - name: Build site
        working-directory: web
        env:
          NEXT_PUBLIC_API_URL: ${{ steps.outputs.outputs.API_URL }}
          NEXT_PUBLIC_COGNITO_REGION: ${{ steps.outputs.outputs.REGION }}
          NEXT_PUBLIC_COGNITO_USER_POOL_ID: ${{ steps.outputs.outputs.POOL_ID }}
          NEXT_PUBLIC_COGNITO_CLIENT_ID: ${{ steps.outputs.outputs.CLIENT_ID }}
          NEXT_PUBLIC_IMAGES_BASE_URL: https://${{ steps.outputs.outputs.DOMAIN }}/images
        run: npm run build

      - name: Sync to S3
        working-directory: web
        run: |
          aws s3 sync out/ s3://${{ steps.outputs.outputs.SITE_BUCKET }}/ \
            --delete \
            --cache-control "public,max-age=0,must-revalidate" \
            --exclude "_next/static/*"
          aws s3 sync out/_next/static/ s3://${{ steps.outputs.outputs.SITE_BUCKET }}/_next/static/ \
            --cache-control "public,max-age=31536000,immutable"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.outputs.outputs.DIST_ID }} \
            --paths "/*"
